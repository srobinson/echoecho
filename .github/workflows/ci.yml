name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  validate:
    name: Lint, typecheck, test, and validate migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: |
          yarn workspace @echoecho/shared run typecheck
          yarn workspace @echoecho/admin run typecheck
          yarn workspace @echoecho/student run typecheck

      - name: Lint
        run: |
          yarn workspace @echoecho/admin run lint
          yarn workspace @echoecho/student run lint

      - name: Tests
        run: |
          yarn workspace @echoecho/shared run test
          yarn workspace @echoecho/admin run test
          yarn workspace @echoecho/student run test

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate migrations (dry-run against staging)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db push --dry-run --project-ref ${{ secrets.STAGING_PROJECT_REF }}

      - name: Lint Edge Functions
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Deno lint
        run: deno lint supabase/functions/
